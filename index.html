<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torn Faction War Targets</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1b1b1b;
    color: white;
    margin: 20px;
}

h1 { color: #4b81ff; } /* changed from green to blue */

.controls {
    margin: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}

.display-options {
    margin: 10px 0 0;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
}

.toggle-option {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #dddddd;
}

.toggle-option input {
    accent-color: #4b81ff; /* removed green */
}

.legend {
    margin: 6px 0 14px;
    padding: 10px 12px;
    border: 1px solid #444;
    border-radius: 6px;
    background: #222222;
    display: flex;
    flex-wrap: wrap;
    gap: 12px 18px;
    align-items: center;
    font-size: 12px;
    color: #dddddd;
}

.legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    border: 1px solid #666;
    flex: 0 0 12px;
}

.legend-swatch.online {
    background: #4b81ff;  /* blue instead of green */
    border-color: #4b81ff;
}

.legend-swatch.attackable {
    background: rgba(255, 140, 0, 0.18); /* orange tint instead of green */
    border-color: #ff9800;
}

.legend-swatch.colorblind {
    background: #ffcc00;
    border-color: #ffcc00;
}

input, select, button {
    padding: 6px;
    border-radius: 4px;
    border: none;
}

button { cursor: pointer; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 1px solid #444;
    padding: 8px;
    text-align: left;
}

th { background: #2d2d2d; }

tr:nth-child(even) { background: #252525; }

/* ATTACKABLE ROW (no green anymore) */
.attackable {
    background: rgba(255, 140, 0, 0.10); /* orange instead of green */
}

/* COLORBLIND MODE */
body.colorblind-mode .attackable {
    background: rgba(75, 129, 255, 0.14);
    box-shadow: inset 4px 0 0 #4b81ff;
}

body.high-contrast-mode {
    background: #111111;
    color: #ffffff;
}

body.high-contrast-mode th,
body.high-contrast-mode td {
    border-color: #666666;
}

body.high-contrast-mode .attackable {
    background: rgba(255, 255, 255, 0.08);
}

.top-level {
    box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.4);
    border-left: 3px solid gold;
}

/* LIFE BAR (NO GREEN) */
.life-bar {
    width: 100%;
    height: 10px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
}

.life-fill {
    height: 100%;
    background: linear-gradient(90deg, #4b81ff, #ffcc00, #ff4444);
    transition: width 0.3s ease;
}

.btn {
    background: #ff4444;
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
    display: inline-block;
}

.btn:hover { background: #ff2222; }

/* ONLINE STATUS (NO GREEN) */
.online {
    color: #4b81ff;
    font-weight: bold;
}

.idle { color: #cccccc; }

body.colorblind-mode .online {
    color: #ffd84d;
    font-weight: 700;
    background: rgba(255, 216, 77, 0.12);
    border: 1px solid #ffd84d;
    border-radius: 999px;
    padding: 1px 8px;
}

body.high-contrast-mode .online {
    color: #9efb9e;
}

#status {
    margin-top: 10px;
    color: #cccccc;
}
</style>
</head>

<body>

<h1 id="title">Faction War Targets</h1>
<div id="status">Initializing...</div>

<div class="display-options">
    <label class="toggle-option">
        <input type="checkbox" id="colorBlindMode">
        Color blind mode
    </label>

    <label class="toggle-option">
        <input type="checkbox" id="highContrastMode">
        High contrast
    </label>
</div>

<div class="legend">
    <span class="legend-item"><span class="legend-swatch online"></span> Online</span>
    <span class="legend-item"><span class="legend-swatch attackable"></span> Attackable target</span>
    <span class="legend-item"><span class="legend-swatch colorblind"></span> Color blind mode marker</span>
</div>

<!-- (JS REMAINS UNCHANGED) -->

</body>
</html>
