<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torn Faction War Targets</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1b1b1b;
    color: white;
    margin: 20px;
}

h1 { color: #4b81ff; }

.controls {
    margin: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}

.display-options {
    margin: 10px 0 0;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
}

.toggle-option {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #dddddd;
}

.toggle-option input {
    accent-color: #4b81ff;
}

.legend {
    margin: 6px 0 14px;
    padding: 10px 12px;
    border: 1px solid #444;
    border-radius: 6px;
    background: #222222;
    display: flex;
    flex-wrap: wrap;
    gap: 12px 18px;
    align-items: center;
    font-size: 12px;
    color: #dddddd;
}

.legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    border: 1px solid #666;
}

.legend-swatch.online {
    background: #4b81ff;
    border-color: #4b81ff;
}

.legend-swatch.attackable {
    background: rgba(255, 140, 0, 0.18);
    border-color: #ff9800;
}

.legend-swatch.colorblind {
    background: #ffcc00;
    border-color: #ffcc00;
}

label { font-size: 13px; }

input, select, button {
    padding: 6px;
    border-radius: 4px;
    border: none;
}

button { cursor: pointer; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 1px solid #444;
    padding: 8px;
    text-align: left;
}

th { background: #2d2d2d; }

tr:nth-child(even) { background: #252525; }

/* ATTACKABLE */
.attackable {
    background: rgba(255, 140, 0, 0.10);
}

body.colorblind-mode .attackable {
    background: rgba(75, 129, 255, 0.14);
    box-shadow: inset 4px 0 0 #4b81ff;
}

/* HIGH CONTRAST */
body.high-contrast-mode {
    background: #111;
    color: #fff;
}

body.high-contrast-mode th,
body.high-contrast-mode td {
    border-color: #666;
}

body.high-contrast-mode .attackable {
    background: rgba(255, 255, 255, 0.08);
}

/* LIFE BAR (NO GREEN ANYWHERE) */
.life-bar {
    width: 100%;
    height: 10px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
}

.life-fill {
    height: 100%;
    transition: width 0.3s ease;
}

/* color states */
.life-fill.high {
    background: #4b81ff; /* healthy */
}

.life-fill.mid {
    background: #ffcc00; /* medium */
}

.life-fill.low {
    background: #ff4444; /* danger */
}

/* BUTTON */
.btn {
    background: #ff4444;
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
    display: inline-block;
}

.btn:hover { background: #ff2222; }

/* ONLINE STATUS */
.online {
    color: #4b81ff;
    font-weight: bold;
}

.idle { color: #cccccc; }

body.colorblind-mode .online {
    color: #ffd84d;
    background: rgba(255, 216, 77, 0.12);
    border: 1px solid #ffd84d;
    border-radius: 999px;
    padding: 1px 8px;
}

#status {
    margin-top: 10px;
    color: #cccccc;
}
</style>
</head>

<body>

<h1 id="title">Faction War Targets</h1>
<div id="status">Initializing...</div>

<div class="display-options">
    <label class="toggle-option">
        <input type="checkbox" id="colorBlindMode">
        Color blind mode
    </label>

    <label class="toggle-option">
        <input type="checkbox" id="highContrastMode">
        High contrast
    </label>
</div>

<div class="legend">
    <span class="legend-item"><span class="legend-swatch online"></span> Online</span>
    <span class="legend-item"><span class="legend-swatch attackable"></span> Attackable target</span>
    <span class="legend-item"><span class="legend-swatch colorblind"></span> Color blind marker</span>
</div>

<form id="loginForm" class="controls">

    <label>
        API Key:
        <input type="text" id="apiKey">
    </label>

    <label>
        Faction ID:
        <input type="text" id="factionId">
    </label>

    <button type="submit">Load</button>

    <label>
        Min Level:
        <input type="number" id="minLevel" value="0">
    </label>

    <label>
        Max Level:
        <input type="number" id="maxLevel" value="999">
    </label>

    <label>
        Sort:
        <select id="sortDir">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
        </select>
    </label>

    <button type="button" onclick="toggleHittable()">Hittable NOW</button>
    <button type="button" onclick="loadMembers()">Refresh</button>
</form>

<table>
<thead>
<tr>
    <th>Name</th>
    <th>Age</th>
    <th>Level</th>
    <th>Online</th>
    <th>Life</th>
    <th>Status</th>
    <th>Action</th>
</tr>
</thead>

<tbody id="results"></tbody>
</table>

<script>

let membersCache = [];
let factionName = "";
let hittableMode = false;

document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    loadMembers();
});

function lifePercent(cur, max) {
    return Math.min(100, Math.round((cur / max) * 100));
}

function getLifeClass(percent) {
    if (percent < 30) return "low";
    if (percent < 70) return "mid";
    return "high";
}

function timeAgo(ts) {
    const now = Math.floor(Date.now() / 1000);
    const diff = now - ts;

    if (diff < 300) return "Online";
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
}

async function loadMembers() {

    const apiKey = document.getElementById("apiKey").value;
    const factionId = document.getElementById("factionId").value;

    const status = document.getElementById("status");

    if (!apiKey || !factionId) {
        status.textContent = "Enter API Key + Faction ID.";
        return;
    }

    status.textContent = "Loading...";

    try {
        const res = await fetch(
            `https://api.torn.com/faction/${factionId}?selections=basic&key=${apiKey}`
        );

        const data = await res.json();

        factionName = data.name;
        const entries = Object.entries(data.members);

        membersCache = await Promise.all(entries.map(async ([id, m]) => {

            const res = await fetch(
                `https://api.torn.com/user/${id}?selections=profile&key=${apiKey}`
            );
            const u = await res.json();

            const now = Math.floor(Date.now() / 1000);

            return {
                id,
                name: m.name,
                level: m.level,
                age: u.age,
                lifeCurrent: u.life?.current || 0,
                lifeMax: u.life?.maximum || 1,
                lastAction: u.last_action?.timestamp || 0,
                online: (now - u.last_action?.timestamp) <= 300,
                attackable: m.status?.description === "Okay"
            };
        }));

        renderTable();

    } catch (e) {
        status.textContent = "Failed to load.";
    }
}

function renderTable() {

    const tbody = document.getElementById("results");
    const min = +document.getElementById("minLevel").value;
    const max = +document.getElementById("maxLevel").value;
    const sort = document.getElementById("sortDir").value;

    let data = membersCache.filter(m =>
        m.level >= min && m.level <= max
    );

    data.sort((a,b)=> sort === "asc" ? a.level - b.level : b.level - a.level);

    tbody.innerHTML = "";

    data.forEach(m => {

        if (hittableMode && !m.attackable) return;

        const percent = lifePercent(m.lifeCurrent, m.lifeMax);
        const lifeClass = getLifeClass(percent);

        const row = document.createElement("tr");
        if (m.attackable) row.classList.add("attackable");

        row.innerHTML = `
            <td>${m.name}</td>
            <td>${m.age}</td>
            <td>${m.level}</td>
            <td class="online">${m.online ? "Online" : timeAgo(m.lastAction)}</td>
            <td>
                ${m.lifeCurrent}/${m.lifeMax}
                <div class="life-bar">
                    <div class="life-fill ${lifeClass}" style="width:${percent}%"></div>
                </div>
            </td>
            <td>${m.attackable ? "Attackable" : "Safe"}</td>
            <td><a class="btn" target="_blank"
               href="https://www.torn.com/profiles.php?XID=${m.id}">Attack</a></td>
        `;

        tbody.appendChild(row);
    });

    document.getElementById("title").textContent =
        `Faction War Targets - ${factionName}`;

    document.getElementById("status").textContent =
        `Loaded ${data.length} members`;
}

function toggleHittable() {
    hittableMode = !hittableMode;
    renderTable();
}

</script>

</body>
</html>
