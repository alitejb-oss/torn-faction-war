<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torn Faction War Targets</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1b1b1b;
    color: white;
    margin: 20px;
}

h1 { color: #00cc66; }

.controls {
    margin: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}

label { font-size: 13px; }

input, select, button {
    padding: 6px;
    border-radius: 4px;
    border: none;
}

button { cursor: pointer; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 1px solid #444;
    padding: 8px;
    text-align: left;
}

th { background: #2d2d2d; }

tr:nth-child(even) { background: #252525; }

.attackable {
    background: rgba(0, 255, 0, 0.08);
}

.top-level {
    box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.4);
    border-left: 3px solid gold;
}

.life-bar {
    width: 100%;
    height: 10px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
}

.life-fill {
    height: 100%;
    background: linear-gradient(90deg, #00ff66, #ffcc00, #ff4444);
    transition: width 0.3s ease;
}

/* Color blind mode - blue, orange, red palette */
body.colorblind .life-fill {
    background: linear-gradient(90deg, #0173B2, #DE8F05, #CC78BC);
}

body.colorblind .attackable {
    background: rgba(1, 115, 178, 0.08);
}

.btn {
    background: #ff4444;
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
    display: inline-block;
}

.btn:hover { background: #ff2222; }

.online { color: #00ff88; font-weight: bold; }
.idle { color: #cccccc; }

#status {
    margin-top: 10px;
    color: #cccccc;
}

.toggle-btn {
    background: #444;
    color: white;
    padding: 6px 10px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-size: 13px;
}

.toggle-btn.active {
    background: #0173B2;
}

.toggle-btn:hover {
    background: #555;
}

.toggle-btn.active:hover {
    background: #0156A0;
}
</style>
</head>

<body>

<h1 id="title">Faction War Targets</h1>
<div id="status">Initializing...</div>

<!-- LOGIN FORM -->
<form id="loginForm" autocomplete="on" class="controls">

    <label>
        API Key:
        <input type="text" id="apiKey" name="apiKey"
               placeholder="Enter Torn API Key"
               autocomplete="username">
    </label>

    <label>
        Faction ID:
        <input type="text" id="factionId" name="factionId"
               placeholder="Enter Faction ID"
               autocomplete="off">
    </label>

    <button type="submit">Load</button>

    <label>
        Min Level:
        <input type="number" id="minLevel" value="0">
    </label>

    <label>
        Max Level:
        <input type="number" id="maxLevel" value="999">
    </label>

    <label>
        Sort:
        <select id="sortDir">
            <option value="asc" selected>Ascending</option>
            <option value="desc">Descending</option>
        </select>
    </label>

    <button type="button" onclick="toggleHittable()">🔴 Hittable NOW</button>
    <button type="button" onclick="toggleColorBlind()" class="toggle-btn" id="colorblindBtn">🎨 Color Blind Mode</button>
    <button type="button" onclick="loadMembers()">Refresh</button>

</form>

<table>
<thead>
<tr>
    <th>Name</th>
    <th>Age</th>
    <th>Level</th>
    <th>Online</th>
    <th>Life</th>
    <th>Status</th>
    <th>Action</th>
</tr>
</thead>

<tbody id="results"></tbody>
</table>

<script>

let membersCache = [];
let factionName = "";
let hittableMode = false;
let colorblindMode = false;

/* =========================
   LOGIN + AUTO LOGIN
   ========================= */

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    saveSettings();
    loadMembers();
});

/* =========================
   SAVE / LOAD
   ========================= */

function saveSettings() {
    localStorage.setItem("torn_apiKey", document.getElementById("apiKey").value);
    localStorage.setItem("torn_factionId", document.getElementById("factionId").value);
    localStorage.setItem("torn_colorblindMode", colorblindMode);
}

function loadSettings() {
    const apiKey = localStorage.getItem("torn_apiKey");
    const factionId = localStorage.getItem("torn_factionId");
    const colorblind = localStorage.getItem("torn_colorblindMode") === "true";

    if (apiKey) document.getElementById("apiKey").value = apiKey;
    if (factionId) document.getElementById("factionId").value = factionId;
    
    if (colorblind) {
        colorblindMode = true;
        applyColorblindMode();
    }
}

/* =========================
   HELPERS
   ========================= */

function getAPIKey() {
    return document.getElementById("apiKey").value.trim();
}

function getFactionID() {
    return document.getElementById("factionId").value.trim();
}

function lifePercent(cur, max) {
    return Math.min(100, Math.round((cur / max) * 100));
}

function timeAgo(ts) {
    const now = Math.floor(Date.now() / 1000);
    const diff = now - ts;

    if (diff < 300) return "Online";
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
}

function formatHospitalTime(seconds) {
    if (!seconds || seconds <= 0) return "Released";
    
    const days = Math.floor(seconds / 86400);
    const hours = Math.floor((seconds % 86400) / 3600);
    const minutes = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;
    
    let result = [];
    if (days > 0) result.push(`${days}d`);
    if (hours > 0) result.push(`${hours}h`);
    if (minutes > 0) result.push(`${minutes}m`);
    if (secs > 0) result.push(`${secs}s`);
    
    return result.length > 0 ? result.join(" ") : "Released";
}

/* =========================
   FETCH USER DATA
   ========================= */

async function fetchUserStats(id, apiKey) {
    try {
        const res = await fetch(
            `https://api.torn.com/user/${id}?selections=profile&key=${apiKey}`
        );
        const data = await res.json();

        return {
            age: data.age || null,
            lifeCurrent: data.life?.current || 0,
            lifeMax: data.life?.maximum || 1,
            lastAction: data.last_action?.timestamp || 0,
            statusState: data.status?.state || "Okay",
            statusUntil: data.status?.until || 0
        };

    } catch {
        return {
            age: null,
            lifeCurrent: 0,
            lifeMax: 1,
            lastAction: 0,
            statusState: "Okay",
            statusUntil: 0
        };
    }
}

/* =========================
   LOAD FACTION
   ========================= */

async function loadMembers() {

    const apiKey = getAPIKey();
    const factionId = getFactionID();

    const status = document.getElementById("status");

    if (!apiKey || !factionId) {
        status.textContent = "Enter API Key + Faction ID.";
        return;
    }

    status.textContent = "Loading faction data...";

    try {
        const res = await fetch(
            `https://api.torn.com/faction/${factionId}?selections=basic&key=${apiKey}`
        );

        const data = await res.json();

        if (data.error) {
            status.textContent = data.error.error;
            return;
        }

        factionName = data.name;
        const entries = Object.entries(data.members);

        membersCache = await Promise.all(entries.map(async ([id, m]) => {

            const stats = await fetchUserStats(id, apiKey);

            const now = Math.floor(Date.now() / 1000);

            return {
                id,
                name: m.name,
                level: m.level || 0,
                age: stats.age,
                lifeCurrent: stats.lifeCurrent,
                lifeMax: stats.lifeMax,
                lastAction: stats.lastAction,
                online: (now - stats.lastAction) <= 300,
                statusState: stats.statusState,
                statusUntil: stats.statusUntil,
                attackable: m.status?.description === "Okay"
            };
        }));

        renderTable();

    } catch (err) {
        status.textContent = "Failed to load.";
        console.error(err);
    }
}

/* =========================
   RENDER TABLE
   ========================= */

function renderTable() {

    const tbody = document.getElementById("results");

    const min = +document.getElementById("minLevel").value;
    const max = +document.getElementById("maxLevel").value;
    const sort = document.getElementById("sortDir").value;

    let data = membersCache.filter(m =>
        m.level >= min &&
        m.level <= max &&
        m.age !== null
    );

    data.sort((a,b)=> sort === "asc" ? a.level - b.level : b.level - a.level);

    tbody.innerHTML = "";

    data.forEach(m => {

        if (hittableMode && !m.attackable) return;

        const percent = lifePercent(m.lifeCurrent, m.lifeMax);
        const hospitalTime = formatHospitalTime(m.statusUntil);

        const row = document.createElement("tr");

        if (m.attackable) row.classList.add("attackable");

        row.innerHTML = `
            <td>${m.name}</td>
            <td>${m.age}</td>
            <td>${m.level}</td>
            <td>${timeAgo(m.lastAction)}</td>
            <td>
                ${m.lifeCurrent}/${m.lifeMax}
                <div class="life-bar">
                    <div class="life-fill" style="width:${percent}%"></div>
                </div>
            </td>
            <td>${m.statusState === "Okay" ? "Okay" : m.statusState} ${m.statusState !== "Okay" ? `(${hospitalTime})` : ""}</td>
            <td>
                <a class="btn" target="_blank"
                   href="https://www.torn.com/profiles.php?XID=${m.id}">
                   Attack
                </a>
            </td>
        `;

        tbody.appendChild(row);
    });

    document.getElementById("title").textContent =
        `Faction War Targets - ${factionName}`;

    document.getElementById("status").textContent =
        `Loaded ${data.length} members`;
}

/* =========================
   TOGGLE MODE
   ========================= */

function toggleHittable() {
    hittableMode = !hittableMode;
    renderTable();
}

function toggleColorBlind() {
    colorblindMode = !colorblindMode;
    applyColorblindMode();
    saveSettings();
}

function applyColorblindMode() {
    const btn = document.getElementById("colorblindBtn");
    if (colorblindMode) {
        document.body.classList.add("colorblind");
        btn.classList.add("active");
    } else {
        document.body.classList.remove("colorblind");
        btn.classList.remove("active");
    }
}

/* =========================
   AUTO LOGIN ON OPEN
   ========================= */

window.addEventListener("load", () => {
    loadSettings();

    const apiKey = getAPIKey();
    const factionId = getFactionID();

    if (apiKey && factionId) {
        loadMembers(); // 🔥 auto-login
    } else {
        document.getElementById("status").textContent =
            "Enter API Key + Faction ID to begin.";
    }
});

</script>

</body>
</html>
