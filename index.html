<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .joke-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joke-text {
            font-size: 1.3em;
            color: #333;
            font-weight: 500;
            line-height: 1.6;
        }

        .loading {
            color: #667eea;
            font-style: italic;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
            margin: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .joke-counter {
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }

        .error {
            color: #e74c3c;
            padding: 20px;
            background: #fadbd8;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .joke-text {
                font-size: 1.1em;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        
        <div id="errorMessage" class="error" style="display: none;"></div>
        
        <div class="joke-box">
            <div class="joke-text" id="jokeText">Click "Get Joke" to start laughing!</div>
        </div>

        <div class="button-group">
            <button onclick="getRandomJoke()">Get Joke</button>
            <button onclick="getDadJoke()">Dad Joke</button>
            <button onclick="copyJoke()">Copy Joke</button>
        </div>

        <div class="joke-counter">
            <p>Jokes loaded: <span id="jokeCount">0</span></p>
        </div>
    </div>

    <script>
        let jokeCount = 0;
        let currentJoke = '';

        // Fetch random joke from Official Joke API
        async function getRandomJoke() {
            const jokeElement = document.getElementById('jokeText');
            const errorElement = document.getElementById('errorMessage');
            
            jokeElement.classList.add('loading');
            jokeElement.textContent = 'Loading joke...';
            errorElement.style.display = 'none';

            try {
                const response = await fetch('https://official-joke-api.appspot.com/random_joke');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();
                currentJoke = `${data.setup}\n\n${data.punchline}`;
                jokeElement.textContent = currentJoke;
                jokeCount++;
                document.getElementById('jokeCount').textContent = jokeCount;
            } catch (error) {
                jokeElement.textContent = 'Oops! Could not load joke. Try again!';
                errorElement.textContent = `Error: ${error.message}`;
                errorElement.style.display = 'block';
                console.error('Error:', error);
            } finally {
                jokeElement.classList.remove('loading');
            }
        }

        // Fetch dad joke from Joke API
        async function getDadJoke() {
            const jokeElement = document.getElementById('jokeText');
            const errorElement = document.getElementById('errorMessage');
            
            jokeElement.classList.add('loading');
            jokeElement.textContent = 'Loading dad joke...';
            errorElement.style.display = 'none';

            try {
                const response = await fetch('https://icanhazdadjoke.com/random?type=json');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch dad joke');
                }

                const data = await response.json();
                currentJoke = data.joke;
                jokeElement.textContent = currentJoke;
                jokeCount++;
                document.getElementById('jokeCount').textContent = jokeCount;
            } catch (error) {
                jokeElement.textContent = 'Oops! Could not load joke. Try again!';
                errorElement.textContent = `Error: ${error.message}`;
                errorElement.style.display = 'block';
                console.error('Error:', error);
            } finally {
                jokeElement.classList.remove('loading');
            }
        }

        // Copy joke to clipboard
        function copyJoke() {
            if (!currentJoke) {
                alert('Please load a joke first!');
                return;
            }

            navigator.clipboard.writeText(currentJoke).then(() => {
                alert('Joke copied to clipboard! 📋');
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy joke');
            });
        }

        // Load a joke on page load
        window.addEventListener('load', () => {
            getRandomJoke();
        });
    </script>
</body>
</html>
