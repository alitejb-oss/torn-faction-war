<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torn Faction War Targets</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1b1b1b;
    color: white;
    margin: 20px;
}

h1 { color: #00cc66; } /* NORMAL MODE GREEN */

.controls {
    margin: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.display-options {
    margin: 10px 0;
    display: flex;
    gap: 15px;
}

.toggle-option {
    font-size: 13px;
}

/* =========================
   NORMAL MODE (GREEN SYSTEM)
   ========================= */

body:not(.colorblind) .online {
    color: #00ff88;
    font-weight: bold;
}

body:not(.colorblind) .life-fill {
    background: linear-gradient(90deg, #00ff66, #ffcc00, #ff4444);
}

body:not(.colorblind) .attackable {
    background: rgba(0, 255, 0, 0.08);
}

/* =========================
   COLORBLIND MODE (NO GREEN)
   ========================= */

body.colorblind h1 { color: #4b81ff; }

body.colorblind .online {
    color: #4b81ff;
    font-weight: bold;
}

body.colorblind .attackable {
    background: rgba(75, 129, 255, 0.14);
    box-shadow: inset 4px 0 0 #4b81ff;
}

body.colorblind .life-fill.low {
    background: #ff4444;
}

body.colorblind .life-fill.mid {
    background: #ffcc00;
}

body.colorblind .life-fill.high {
    background: #4b81ff;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 1px solid #444;
    padding: 8px;
}

th { background: #2d2d2d; }

tr:nth-child(even) { background: #252525; }

/* LIFE BAR */
.life-bar {
    width: 100%;
    height: 10px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
}

.life-fill {
    height: 100%;
    transition: width 0.3s ease;
}

/* BUTTON */
.btn {
    background: #ff4444;
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
}

/* STATUS */
#status { color: #ccc; }
</style>
</head>

<body>

<h1 id="title">Faction War Targets</h1>
<div id="status">Initializing...</div>

<div class="display-options">
    <label class="toggle-option">
        <input type="checkbox" id="colorBlindToggle">
        Colorblind Mode (ON/OFF)
    </label>
</div>

<form id="loginForm">
    <input id="apiKey" placeholder="API Key">
    <input id="factionId" placeholder="Faction ID">
    <button>Load</button>
</form>

<table>
<thead>
<tr>
    <th>Name</th>
    <th>Level</th>
    <th>Online</th>
    <th>Life</th>
    <th>Status</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>

let membersCache = [];

/* =========================
   TOGGLE MODE
   ========================= */

document.getElementById("colorBlindToggle").addEventListener("change", (e) => {
    document.body.classList.toggle("colorblind", e.target.checked);
    renderTable();
});

/* =========================
   LOAD DATA
   ========================= */

document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    loadMembers();
});

function lifeClass(p) {
    if (p < 30) return "low";
    if (p < 70) return "mid";
    return "high";
}

async function loadMembers() {

    const apiKey = apiKey.value;
    const factionId = factionId.value;

    const res = await fetch(`https://api.torn.com/faction/${factionId}?selections=basic&key=${apiKey}`);
    const data = await res.json();

    const entries = Object.entries(data.members);

    membersCache = await Promise.all(entries.map(async ([id, m]) => {

        const u = await fetch(`https://api.torn.com/user/${id}?selections=profile&key=${apiKey}`).then(r => r.json());

        return {
            id,
            name: m.name,
            level: m.level,
            life: u.life?.current || 0,
            max: u.life?.maximum || 1,
            last: u.last_action?.timestamp || 0
        };
    }));

    renderTable();
}

/* =========================
   RENDER
   ========================= */

function renderTable() {

    const tbody = document.getElementById("results");
    tbody.innerHTML = "";

    membersCache.forEach(m => {

        const percent = Math.round((m.life / m.max) * 100);
        const cls = lifeClass(percent);

        const online = (Date.now()/1000 - m.last) < 300
            ? `<span class="online">Online</span>`
            : "Offline";

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${m.name}</td>
            <td>${m.level}</td>
            <td>${online}</td>
            <td>
                ${m.life}/${m.max}
                <div class="life-bar">
                    <div class="life-fill ${cls}" style="width:${percent}%"></div>
                </div>
            </td>
            <td>OK</td>
        `;

        tbody.appendChild(row);
    });

    document.getElementById("status").textContent =
        `Loaded ${membersCache.length} members`;
}

</script>

</body>
</html>
