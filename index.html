<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torn Faction War Targets</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1b1b1b;
    color: white;
    margin: 20px;
}

/* =========================
   HEADERS
   ========================= */
h1 { color: #00cc66; } /* NORMAL = GREEN */
body.colorblind h1 { color: #4b81ff; }

/* =========================
   CONTROLS
   ========================= */
.controls {
    margin: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.display-options {
    margin: 10px 0;
    display: flex;
    gap: 15px;
}

.toggle-option {
    font-size: 13px;
}

/* =========================
   TABLE
   ========================= */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 1px solid #444;
    padding: 8px;
}

th { background: #2d2d2d; }

tr:nth-child(even) { background: #252525; }

/* =========================
   LIFE BAR
   ========================= */
.life-bar {
    width: 100%;
    height: 10px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
}

.life-fill {
    height: 100%;
    transition: width 0.3s ease;
}

/* NORMAL MODE (GREEN SYSTEM) */
body:not(.colorblind) .life-fill.high {
    background: #00ff66;
}

body:not(.colorblind) .life-fill.mid {
    background: #ffcc00;
}

body:not(.colorblind) .life-fill.low {
    background: #ff4444;
}

/* =========================
   COLORBLIND MODE (NO GREEN)
   ========================= */
body.colorblind .life-fill.high {
    background: #4b81ff; /* blue */
}

body.colorblind .life-fill.mid {
    background: #ffcc00; /* yellow */
}

body.colorblind .life-fill.low {
    background: #ff4444; /* red */
}

/* =========================
   ONLINE STATUS
   ========================= */
.online {
    font-weight: bold;
}

/* NORMAL = GREEN */
body:not(.colorblind) .online {
    color: #00ff88;
}

/* COLORBLIND = BLUE */
body.colorblind .online {
    color: #4b81ff;
}

/* =========================
   ATTACKABLE ROW
   ========================= */
body:not(.colorblind) .attackable {
    background: rgba(0, 255, 0, 0.08);
}

body.colorblind .attackable {
    background: rgba(75, 129, 255, 0.14);
    box-shadow: inset 4px 0 0 #4b81ff;
}

/* BUTTON */
.btn {
    background: #ff4444;
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    text-decoration: none;
    display: inline-block;
}

#status {
    margin-top: 10px;
    color: #cccccc;
}
</style>
</head>

<body>

<h1 id="title">Faction War Targets</h1>
<div id="status">Initializing...</div>

<!-- COLORBLIND TOGGLE -->
<div class="display-options">
    <label class="toggle-option">
        <input type="checkbox" id="colorBlindToggle">
        Colorblind Mode (ON/OFF)
    </label>
</div>

<!-- INPUTS -->
<form id="loginForm" class="controls">

    <input id="apiKey" placeholder="API Key">
    <input id="factionId" placeholder="Faction ID">
    <button type="submit">Load</button>

    <input type="number" id="minLevel" value="0">
    <input type="number" id="maxLevel" value="999">

</form>

<table>
<thead>
<tr>
    <th>Name</th>
    <th>Level</th>
    <th>Online</th>
    <th>Life</th>
    <th>Status</th>
    <th>Action</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>

let membersCache = [];

/* =========================
   TOGGLE COLORBLIND MODE
   ========================= */
document.getElementById("colorBlindToggle").addEventListener("change", (e) => {
    document.body.classList.toggle("colorblind", e.target.checked);
    renderTable();
});

/* =========================
   LOAD DATA
   ========================= */
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    await loadMembers();
});

function lifeClass(percent) {
    if (percent < 30) return "low";
    if (percent < 70) return "mid";
    return "high";
}

/* =========================
   FETCH FACTION
   ========================= */
async function loadMembers() {

    const apiKey = document.getElementById("apiKey").value;
    const factionId = document.getElementById("factionId").value;

    const status = document.getElementById("status");

    status.textContent = "Loading...";

    const res = await fetch(
        `https://api.torn.com/faction/${factionId}?selections=basic&key=${apiKey}`
    );

    const data = await res.json();
    const entries = Object.entries(data.members);

    membersCache = await Promise.all(entries.map(async ([id, m]) => {

        const u = await fetch(
            `https://api.torn.com/user/${id}?selections=profile&key=${apiKey}`
        ).then(r => r.json());

        return {
            id,
            name: m.name,
            level: m.level,
            life: u.life?.current || 0,
            max: u.life?.maximum || 1,
            last: u.last_action?.timestamp || 0
        };
    }));

    renderTable();
}

/* =========================
   RENDER TABLE
   ========================= */
function renderTable() {

    const tbody = document.getElementById("results");
    tbody.innerHTML = "";

    membersCache.forEach(m => {

        const percent = Math.round((m.life / m.max) * 100);
        const cls = lifeClass(percent);

        const online = (Date.now()/1000 - m.last) < 300
            ? `<span class="online">Online</span>`
            : "Offline";

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${m.name}</td>
            <td>${m.level}</td>
            <td>${online}</td>
            <td>
                ${m.life}/${m.max}
                <div class="life-bar">
                    <div class="life-fill ${cls}" style="width:${percent}%"></div>
                </div>
            </td>
            <td>OK</td>
            <td>
                <a class="btn" target="_blank"
                   href="https://www.torn.com/profiles.php?XID=${m.id}">
                   Attack
                </a>
            </td>
        `;

        tbody.appendChild(row);
    });

    document.getElementById("status").textContent =
        `Loaded ${membersCache.length} members`;
}

</script>

</body>
</html>
